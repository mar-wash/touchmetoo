        header {
            position: fixed;

        nav a {

        }

        nav a:hover {
            opacity: 0.4;
        }

        .container {
            display: flex;
            flex-direction: column;
            padding-top: 150px;
            padding-left: 5vw;
            padding-right: 5vw;
            padding-bottom: 10vh;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 5rem);
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .description {
            font-weight: 300;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 40px;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 40px; /* space between images or sections */
        }

        .content img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 600px) {
            header { padding: 0 20px; }
            nav { gap: 15px; }
            nav a, .site-title { font-size: 0.9rem; }
            h1 { font-size: 2.5rem; margin-bottom: 1rem; }
            .description { font-size: 1rem; }
        }
    </style>
</head>
